<!--
  Three Brains Driver Template — 三脑驾驶图
  ============================================
  基于 Paul MacLean 三重脑模型
  运行时填充：
    {{SCENE}}        刚发生的具体行为，一句话
    {{EVIDENCE}}     为什么判定是这个脑在开车的依据，一句话
    {{NEXT_ACTION}}  最小可行下一步，一句话

    并按 driver 字段在三个 <g class="brain ..."> 中加 highlight class：
      driver="instinct"          → instinct 高亮，emotion/rational 灰阶
      driver="emotion"           → emotion 高亮
      driver="rational_depleted" → rational 高亮（且加电量耗尽指示）

  视觉约定：左 -> 右 = 老到新（本能 -> 情绪 -> 理智）
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="100%" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">

  <style>
    .brain { transition: opacity 0.3s; }
    .dim { opacity: 0.25; }
    .highlight .body { stroke-width: 4; }
    .highlight .label { font-weight: 700; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>

  <!-- 背景 -->
  <rect width="1000" height="720" fill="#fafaf9"/>

  <!-- 标题 -->
  <text x="500" y="48" text-anchor="middle" font-size="22" font-weight="600" fill="#1c1917">
    三脑驾驶图 · 此刻是谁在开你的车
  </text>
  <text x="500" y="74" text-anchor="middle" font-size="13" fill="#78716c">
    场景 · {{SCENE}}
  </text>
  <text x="500" y="96" text-anchor="middle" font-size="11" fill="#a8a29e">
    不是你意志力差，是这个脑在主导。它的逻辑只能借力打力，不能硬碰硬。
  </text>

  <!-- 三个脑（左→右：本能 / 情绪 / 理智） -->
  <!-- 本能脑 -->
  <g class="brain instinct" transform="translate(180 320)">
    <circle class="body" r="100" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text class="label" y="-14" text-anchor="middle" font-size="16" font-weight="600" fill="#991b1b">本能脑</text>
    <text y="8" text-anchor="middle" font-size="11" fill="#7f1d1d">3.6 亿岁 · 老司机一号</text>
    <text y="28" text-anchor="middle" font-size="11" fill="#7f1d1d">只关心：吃饭 · 跑路</text>
    <text y="48" text-anchor="middle" font-size="10" fill="#9f1239">服从环境，不服从口号</text>
  </g>

  <!-- 情绪脑 -->
  <g class="brain emotion" transform="translate(500 320)">
    <circle class="body" r="100" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
    <text class="label" y="-14" text-anchor="middle" font-size="16" font-weight="600" fill="#9a3412">情绪脑</text>
    <text y="8" text-anchor="middle" font-size="11" fill="#7c2d12">2 亿岁 · 老司机二号</text>
    <text y="28" text-anchor="middle" font-size="11" fill="#7c2d12">见喜欢就冲，见讨厌就躲</text>
    <text y="48" text-anchor="middle" font-size="10" fill="#9a3412">需要台阶，不需要鞭子</text>
  </g>

  <!-- 理智脑 -->
  <g class="brain rational" transform="translate(820 320)">
    <circle class="body" r="100" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text class="label" y="-14" text-anchor="middle" font-size="16" font-weight="600" fill="#1e40af">理智脑</text>
    <text y="8" text-anchor="middle" font-size="11" fill="#1e3a8a">250 万岁 · 实习生</text>
    <text y="28" text-anchor="middle" font-size="11" fill="#1e3a8a">会计划 · 会反思 · 但电量低</text>
    <text y="48" text-anchor="middle" font-size="10" fill="#1d4ed8">只够做最重要的一个决定</text>
  </g>

  <!-- 当前在开车的指示（运行时把指针 transform translateX 到对应脑） -->
  <g transform="translate(500 180)">
    <text text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">↓ 此刻在开车的是 ↓</text>
  </g>

  <!-- 诊断卡 -->
  <g transform="translate(140 470)">
    <rect width="720" height="160" rx="14" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>

    <text x="24" y="36" font-size="13" font-weight="600" fill="#57534e">为什么判定是它在开车</text>
    <text x="24" y="60" font-size="13" fill="#1c1917">
      <tspan x="24" dy="0">{{EVIDENCE}}</tspan>
    </text>

    <line x1="24" y1="86" x2="696" y2="86" stroke="#e7e5e4"/>

    <text x="24" y="112" font-size="13" font-weight="600" fill="#16a34a">最小可行下一步（不依赖意志力）</text>
    <text x="24" y="138" font-size="13" fill="#14532d">
      <tspan x="24" dy="0">{{NEXT_ACTION}}</tspan>
    </text>
  </g>

  <!-- 底部签名 -->
  <text x="500" y="688" text-anchor="middle" font-size="12" font-style="italic" fill="#57534e">
    不管你做不做，我都看见你了。
  </text>
</svg>
